<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
<style>
.t { fill: none; stroke: #7b6ff0; stroke-linecap: round; stroke-linejoin: round; }
.t1 { stroke-opacity: 0.14; stroke-width: 1.5; }
.t2 { stroke-opacity: 0.1; stroke-width: 1; }
.v { fill: #7b6ff0; fill-opacity: 0.15; }
.vr { fill: none; stroke: #7b6ff0; stroke-opacity: 0.14; stroke-width: 1; }
</style>
<!-- Pattern 8: Staircase 45s -->
<path class="t t1" d="M0,20 L40,20 L60,40 L100,40 L120,60 L160,60 L180,80 L200,80"/>
<path class="t t1" d="M0,50 L30,50 L50,70 L90,70 L110,90 L150,90 L170,110 L200,110"/>
<path class="t t2" d="M100,40 L100,20"/>
<path class="t t2" d="M150,90 L150,120 L160,130"/>
<circle class="v" cx="100" cy="20" r="3"/>
<circle class="vr" cx="100" cy="20" r="5.5"/>
<circle class="v" cx="60" cy="40" r="3"/>
<circle class="vr" cx="60" cy="40" r="5.5"/>
<circle class="v" cx="150" cy="90" r="3"/>
<circle class="vr" cx="150" cy="90" r="5.5"/>
<circle class="v" cx="160" cy="130" r="3"/>
<circle class="vr" cx="160" cy="130" r="5.5"/>
</svg>

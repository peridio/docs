<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
<style>
.t { fill: none; stroke: #7b6ff0; stroke-linecap: round; stroke-linejoin: round; }
.t1 { stroke-opacity: 0.14; stroke-width: 1.5; }
.t2 { stroke-opacity: 0.1; stroke-width: 1; }
.v { fill: #7b6ff0; fill-opacity: 0.15; }
.vr { fill: none; stroke: #7b6ff0; stroke-opacity: 0.14; stroke-width: 1; }
</style>
<!-- Pattern 1: Horizontal bus with diagonal branch -->
<path class="t t1" d="M0,45 L200,45"/>
<path class="t t1" d="M0,65 L200,65"/>
<path class="t t2" d="M70,45 L80,55 L120,95 L130,105 L130,130"/>
<path class="t t2" d="M140,65 L150,75 L170,75"/>
<circle class="v" cx="70" cy="45" r="3"/>
<circle class="vr" cx="70" cy="45" r="5.5"/>
<circle class="v" cx="130" cy="130" r="3"/>
<circle class="vr" cx="130" cy="130" r="5.5"/>
<circle class="v" cx="140" cy="65" r="3"/>
<circle class="vr" cx="140" cy="65" r="5.5"/>
<circle class="v" cx="170" cy="75" r="3"/>
<circle class="vr" cx="170" cy="75" r="5.5"/>
</svg>

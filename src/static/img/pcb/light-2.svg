<path class="t t2" d="M120,100 L130,100 L155,100"/>
<path class="t t2" d="M80,80 L90,80 L110,80"/>
<circle class="v" cx="20" cy="40" r="3"/>
<circle class="vr" cx="20" cy="40" r="5.5"/>
<circle class="v" cx="155" cy="100" r="3"/>
<circle class="vr" cx="155" cy="100" r="5.5"/>
<circle class="v" cx="110" cy="80" r="3"/>
<circle class="vr" cx="110" cy="80" r="5.5"/>
<circle class="v" cx="140" cy="120" r="3"/>
<circle class="vr" cx="140" cy="120" r="5.5"/>
</svg>

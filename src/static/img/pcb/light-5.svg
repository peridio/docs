<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
<style>
.t { fill: none; stroke: #3424ee; stroke-linecap: round; stroke-linejoin: round; }
.t1 { stroke-opacity: 0.09; stroke-width: 1.5; }
.t2 { stroke-opacity: 0.07; stroke-width: 1; }
.v { fill: #3424ee; fill-opacity: 0.1; }
.vr { fill: none; stroke: #3424ee; stroke-opacity: 0.09; stroke-width: 1; }
</style>
<!-- Pattern 5: Vertical bus with 45-degree branches -->
<path class="t t1" d="M150,0 L150,150"/>
<path class="t t1" d="M170,0 L170,150"/>
<path class="t t2" d="M150,35 L140,25 L100,25 L90,35 L90,55"/>
<path class="t t2" d="M170,80 L160,70 L120,70"/>
<path class="t t2" d="M150,110 L140,100 L70,100"/>
<circle class="v" cx="90" cy="55" r="3"/>
<circle class="vr" cx="90" cy="55" r="5.5"/>
<circle class="v" cx="120" cy="70" r="3"/>
<circle class="vr" cx="120" cy="70" r="5.5"/>
<circle class="v" cx="70" cy="100" r="3"/>
<circle class="vr" cx="70" cy="100" r="5.5"/>
<circle class="v" cx="150" cy="35" r="3"/>
<circle class="vr" cx="150" cy="35" r="5.5"/>
<circle class="v" cx="170" cy="80" r="3"/>
<circle class="vr" cx="170" cy="80" r="5.5"/>
</svg>
